{% extends "base.html" %}
{% block title %}Add Expense — Expense Tracker{% endblock %}
{% block page_title %}Add Expense{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <p class="form-description">Fill in the details below to record a new expense.</p>

    <form method="POST" action="{{ url_for('add_expense') }}" novalidate class="expense-form" id="expense-form">

      <div class="form-group">
        <label for="title" class="form-label">Title <span class="required">*</span></label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-input"
          placeholder="e.g. Grocery shopping"
          value="{{ form_data.get('title', '') }}"
          required
          maxlength="100"
          autocomplete="off"
        />
        <span class="field-hint">Brief description of the expense</span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="amount" class="form-label">Amount (₹) <span class="required">*</span></label>
          <input
            type="number"
            id="amount"
            name="amount"
            class="form-input"
            placeholder="0.00"
            value="{{ form_data.get('amount', '') }}"
            required
            min="0.01"
            step="0.01"
          />
        </div>
        <div class="form-group">
          <label for="date" class="form-label">Date <span class="required">*</span></label>
          <input
            type="date"
            id="date"
            name="date"
            class="form-input"
            value="{{ form_data.get('date', '') }}"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="category" class="form-label">Category <span class="required">*</span></label>
        <select id="category" name="category" class="select form-input" required>
          <option value="">Select a category</option>
          {% for cat in categories %}
            <option value="{{ cat }}" {% if form_data.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="note" class="form-label">Note <span class="optional">(optional)</span></label>
        <textarea
          id="note"
          name="note"
          class="form-input form-textarea"
          placeholder="Any extra details..."
          rows="3"
          maxlength="300"
        >{{ form_data.get('note', '') }}</textarea>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i data-lucide="plus-circle" style="width:16px;height:16px;"></i>
          Add Expense
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
