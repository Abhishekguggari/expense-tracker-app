{% extends "base.html" %}
{% block title %}Account Settings - Expense Tracker{% endblock %}
{% block page_title %}Account Settings{% endblock %}

{% block content %}
<div class="form-page" style="margin: 0 auto;">
  <div class="form-card">
    <form class="expense-form" method="POST" action="{{ url_for('profile') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" value="{{ user['username'] }}" disabled style="opacity: 0.7; cursor: not-allowed;" title="Username cannot be changed">
        <span class="field-hint">Your username is used for logging in and cannot be altered.</span>
      </div>
      
      <div class="form-group" style="margin-top: var(--space-2);">
        <label class="form-label" for="budget">Monthly Budget (₹)</label>
        <input class="form-input" type="number" step="0.01" min="0" id="budget" name="budget" value="{{ user['monthly_budget'] if user['monthly_budget'] else '' }}" placeholder="e.g. 15000">
        <span class="field-hint">Set a target to keep track of your spending limits.</span>
      </div>
      
      <div class="form-group" style="margin-top: var(--space-2);">
        <label class="form-label" for="password">New Password <span class="optional">(Optional)</span></label>
        <input class="form-input" type="password" id="password" name="password" placeholder="Leave blank to keep current password">
      </div>
      
      <div class="form-actions" style="margin-top: var(--space-4);">
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
