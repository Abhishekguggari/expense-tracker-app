{% extends "base.html" %}
{% block title %}Register - Expense Tracker{% endblock %}
{% block page_title %}Create an Account{% endblock %}

{% block content %}
<div class="form-page" style="margin: 0 auto;">
  <div class="form-card">
    <form class="expense-form" method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label" for="username">Choose a Username <span class="required">*</span></label>
        <input class="form-input" type="text" id="username" name="username" placeholder="Pick a unique username" required autofocus>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Create a Password <span class="required">*</span></label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      
      <div class="form-actions" style="justify-content: space-between; align-items: center;">
        <a href="{{ url_for('login') }}" class="text-muted" style="text-decoration: none;">Already have an account?</a>
        <button type="submit" class="btn btn-primary">Register</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
