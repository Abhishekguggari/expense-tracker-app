{% extends "base.html" %}
{% block title %}Edit Expense — Expense Tracker{% endblock %}
{% block page_title %}Edit Expense{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <p class="form-description">Update the details for this expense record.</p>

    <form method="POST" action="{{ url_for('edit_expense', expense_id=expense['id']) }}" novalidate class="expense-form">

      <div class="form-group">
        <label for="title" class="form-label">Title <span class="required">*</span></label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-input"
          value="{{ expense['title'] }}"
          required
          maxlength="100"
          autocomplete="off"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="amount" class="form-label">Amount (₹) <span class="required">*</span></label>
          <input
            type="number"
            id="amount"
            name="amount"
            class="form-input"
            value="{{ expense['amount'] }}"
            required
            min="0.01"
            step="0.01"
          />
        </div>
        <div class="form-group">
          <label for="date" class="form-label">Date <span class="required">*</span></label>
          <input
            type="date"
            id="date"
            name="date"
            class="form-input"
            value="{{ expense['date'] }}"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="category" class="form-label">Category <span class="required">*</span></label>
        <select id="category" name="category" class="select form-input" required>
          <option value="">Select a category</option>
          {% for cat in categories %}
            <option value="{{ cat }}" {% if expense['category'] == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="note" class="form-label">Note <span class="optional">(optional)</span></label>
        <textarea
          id="note"
          name="note"
          class="form-input form-textarea"
          rows="3"
          maxlength="300"
        >{{ expense['note'] or '' }}</textarea>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i data-lucide="save" style="width:16px;height:16px;"></i>
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
